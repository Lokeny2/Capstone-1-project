    <header>
        <h1>Get In Touch</h1>
        <nav>

            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contact Form</h2>
            <form action="action_page.php" method="POST">
                <div>
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" placeholder="NATHANIELMBISHI" required>
                </div>

                <div>
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" placeholder="MUTUMA" required>
                </div>

                <br>

                <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="mutumanathan2@gmail.com" required>
                </div>

                <div>
                <label for="pass">Password:</label>
                <input type="password" id="pass" minlength="6"requiered>
                </div>

                </div>

                <div>
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Write something..." required></textarea>
                </div>

                <br>

                <div>
                    <input type="reset">
                </div>

                <div>
                <button type="submit">Send Message</button>
                </div>
                
            </form>
        </section>
    </main>
